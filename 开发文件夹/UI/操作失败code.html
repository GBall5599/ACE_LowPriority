<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="layout-content-container flex flex-col items-center w-full max-w-md">
<!-- White Card -->
<div class="w-full bg-white dark:bg-slate-900 rounded-xl shadow-lg p-8 flex flex-col items-center text-center border border-slate-100 dark:border-slate-800">
<!-- Error Icon -->
<div class="mb-6 flex items-center justify-center size-20 rounded-full bg-red-50 dark:bg-red-900/20">
<span class="material-symbols-outlined text-red-500 text-5xl">cancel</span>
</div>
<!-- Title -->
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight mb-3">
                    操作失败
                </h2>
<!-- Reason Text -->
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed">
                    原因：网络连接超时，请检查您的网络设置后再试。
                </p>
</div>
<!-- Action Button -->
<div class="mt-8 w-full">
<button class="w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 text-white text-lg font-bold transition-all shadow-md active:scale-[0.98]">
<span class="truncate">启动</span>
</button>
</div>
<!-- Optional Help/Back Link -->
<div class="mt-6">
<button class="text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary text-sm font-medium transition-colors">
                    返回上一页
                </button>
</div>
</div>
<!-- Subtle Background Decorative Elements -->
<div class="fixed -z-10 top-0 left-0 w-full h-full opacity-30 pointer-events-none">
<div class="absolute top-[10%] left-[15%] w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[10%] right-[15%] w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</div>
</body></html>
